name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'update.xml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 4.4.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version and tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "update_xml=true" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date +%Y.%m.%d)
            SHORT_SHA="${GITHUB_SHA:0:7}"
            VER="dev-${DATE}-${SHORT_SHA}"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
            echo "tag=$VER" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "update_xml=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in csproj
        if: steps.ver.outputs.update_xml == 'true'
        shell: pwsh
        run: |
          $csproj = "gamething/Red Guy Takeover.csproj"
          $version = "${{ steps.ver.outputs.version }}"
          $content = Get-Content $csproj -Raw
          $content = $content -replace '<Version>.*?</Version>', "<Version>$version</Version>"
          $content = $content -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>"
          Set-Content $csproj $content

      - name: Publish
        run: dotnet publish "gamething/Red Guy Takeover.csproj" -c Release -r win-x64 --self-contained true -o publish/

      - name: Zip artifact
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $zipName = "RedGuyTakeover-v$version.zip"
          Compress-Archive -Path publish/* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Red Guy Takeover ${{ steps.ver.outputs.version }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}

      - name: Update update.xml
        if: steps.ver.outputs.update_xml == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cat > update.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <item>
            <version>${VERSION}</version>
            <url>https://github.com/kacper-chr/RedGuyTakeover/releases/download/v${VERSION}/RedGuyTakeover-v${VERSION}.zip</url>
            <changelog>https://github.com/kacper-chr/RedGuyTakeover/releases</changelog>
            <mandatory>false</mandatory>
          </item>
          EOF

      - name: Commit updated files
        if: steps.ver.outputs.update_xml == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.xml "gamething/Red Guy Takeover.csproj"
          git commit -m "chore: bump version to ${{ steps.ver.outputs.version }} [skip ci]"
          git push
